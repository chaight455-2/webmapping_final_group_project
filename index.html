<!DOCTYPE html>
<html lang="en" class="h-full">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="theme-color" content="#c5050c">
        <meta name="description" content="Find microwaves, fridges, vending machines, computers, and printers across UW-Madison campus buildings.">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
        <meta name="apple-mobile-web-app-title" content="UW Amenities">
        <link rel="manifest" href="manifest.json">
        <link rel="apple-touch-icon" href="img/icon-192.svg">
        <title>UW-Madison Amenities</title>

        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.6.0/dist/leaflet.css">
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="css/style.css">
    </head>

    <body class="m-0 p-0 h-full font-sans">
        <div id="search-container" class="absolute top-2.5 left-1/2 -translate-x-1/2 z-[1000] w-[90%] max-w-[400px]">
            <input type="text" id="search-bar" class="w-full px-3.5 py-2.5 text-base border-none rounded-lg shadow-md outline-none box-border" placeholder="Search buildings...">
        </div>

        <div id="filter-panel" class="absolute top-[60px] left-2.5 z-[1000] bg-white shadow-md rounded-lg overflow-hidden">
            <div id="filter-toggle" class="flex items-center gap-2 px-2.5 py-2 cursor-pointer text-sm font-semibold text-gray-700">
                <svg id="filter-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                Filters
            </div>
            <div id="filter-list" class="border-t border-gray-100 px-3 pb-2.5">
                <div class="border-b border-gray-100 pb-2 mb-1.5 pt-2">
                    <div class="text-[13px] font-medium text-gray-700 mb-1">Check open at</div>
                    <div class="flex items-center gap-1.5 flex-wrap">
                        <select id="check-day" class="text-[13px] px-1.5 py-1 border border-gray-200 rounded outline-none bg-white">
                            <option value="">Today</option>
                            <option value="0">Sun</option>
                            <option value="1">Mon</option>
                            <option value="2">Tue</option>
                            <option value="3">Wed</option>
                            <option value="4">Thu</option>
                            <option value="5">Fri</option>
                            <option value="6">Sat</option>
                        </select>
                        <input type="time" id="check-time" class="text-[13px] px-1.5 py-1 border border-gray-200 rounded outline-none">
                        <button type="button" id="check-time-reset" class="text-[12px] text-blue-600 underline">Now</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="map"></div>

        <div id="building-sheet" class="hidden" role="dialog" aria-modal="false" aria-labelledby="sheet-title" aria-hidden="true">
            <div id="sheet-handle" aria-hidden="true"></div>
            <header id="sheet-header">
                <button id="sheet-back" type="button" class="hidden" aria-label="Back">&larr;</button>
                <h2 id="sheet-title"></h2>
                <button id="sheet-close" type="button" aria-label="Close">&times;</button>
            </header>
            <div id="sheet-body"></div>
        </div>

        <script type="text/javascript" src="https://unpkg.com/leaflet@1.6.0/dist/leaflet.js"></script>
        <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/d3-dsv@3"></script>
        <script type="text/javascript" src="lib/jquery-3.5.1.js"></script>
        <script type="text/javascript" src="js/config.js"></script>
        <script type="text/javascript" src="js/util.js"></script>
        <script type="text/javascript" src="js/popup.js"></script>
        <script type="text/javascript" src="js/map.js"></script>
        <script type="text/javascript" src="js/data.js"></script>
        <script type="text/javascript" src="js/buildings.js"></script>
        <script type="text/javascript" src="js/filter.js"></script>
        <script type="text/javascript" src="js/search.js"></script>
        <script type="text/javascript" src="js/geolocation.js"></script>
        <script type="text/javascript" src="js/main.js"></script>
        <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('./sw.js').then(function (reg) {
                    console.log('SW registered, scope:', reg.scope);
                }).catch(function (err) {
                    console.log('SW registration failed:', err);
                });
            });
        }
        </script>
    </body>
</html>
